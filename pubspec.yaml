version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^17.1.0  # Latest version as of Feb 2026
  lucide_icons_flutter: ^3.1.10
